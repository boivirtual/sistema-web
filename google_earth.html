<html>
	<meta http-equiv="content-type" content="text/html; charset=utf-8" />
	<head>
  		<title>Hello Google Earth!</title>
		<!-- Adicionando a API (!!Não esqueça de alterar a sua chave!!)-->
    	<script src="http://www.google.com/jsapi?key=AIzaSyD3geJtz7yyKZuxb_MyVJ18GkZQO4uB2GA"></script>

    	<script>
			window.addEventListener("load", function(event) {
			    initMap();
			});

			let map;

			function initMap() {
			  map = new google.maps.Map(document.getElementById("map"), {
			    zoom: 4,
			    center: { lat: -28, lng: 137 },
			  });
			  // NOTE: This uses cross-domain XHR, and may not work on older browsers.
			  map.data.loadGeoJson(
			    "https://agrolandes.com.br/fazendas/sistema/kml/mg5_03.json"
			  );
			}

			window.initMap = initMap;
    	</script>

  	</head>

  	<body>
    	<center>
      		<div id='map3d_container'
           		style='border: 1px solid silver; height: 600px; width: 800px;'>
        		<div id='map' style='height: 100%;'></div>
      		</div>
    	</center>
  	</body>
</html>
