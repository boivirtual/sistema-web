<!DOCTYPE html>
<html>
    <head>
        <title>Data Table</title>
        <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
        <link href="https://github.com/downloads/lafeber/world-flags-sprite/flags32.css" rel="stylesheet">

        <script src="https://code.jquery.com/jquery-3.7.0.js" crossorigin="anonymous"></script>
        <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js" crossorigin="anonymous"></script>

        <style type="text/css">
            .f32 .flag {
            vertical-align: middle;
            margin: -8px 0;
            }
     
            progress {
                width: 100%;
            }
        </style>  
    </head>

    <body>
        <table id="example" class="display nowrap" style="width:100%">
            <thead>
                <tr>
                    <th>Fazenda</th>
                    <th>Position</th>
                    <th>Office</th>
                    <th>Lotaçao (Cab/HA)</th>
                    <th>Ultima Atualizaçao</th>
                    <th>Total de Animais</th>
                </tr>
            </thead>
            <tfoot>
                <tr>
                    <th>Name</th>
                    <th>Position</th>
                    <th>Office</th>
                    <th>Progress</th>
                    <th>Start date</th>
                    <th>Salary</th>
                </tr>
            </tfoot>
        </table>

        <script type="text/javascript">
            new DataTable('#example', {
                ajax: 'objects_salary.txt',
                columns: [
                    {
                        data: 'name'
                    },
                    {
                        data: 'position',
                        render: function (data, type) {
                            if (type === 'display') {
                                let link = 'http://datatables.net';
             
                                if (data[0] < 'H') {
                                    link = 'http://cloudtables.com';
                                }
                                else if (data[0] < 'S') {
                                    link = 'http://editor.datatables.net';
                                }
             
                                return '<a href="' + link + '">' + data + '</a>';
                            }
             
                            return data;
                        }
                    },
                    {
                        className: 'f32', // used by world-flags-sprite library
                        data: 'office',
                        render: function (data, type) {
                            if (type === 'display') {
                                let country = '';
             
                                switch (data) {
                                    case 'Argentina':
                                        country = 'ar';
                                        break;
                                    case 'Edinburgh':
                                        country = '_Scotland';
                                        break;
                                    case 'London':
                                        country = '_England';
                                        break;
                                    case 'New York':
                                    case 'San Francisco':
                                        country = 'us';
                                        break;
                                    case 'Sydney':
                                        country = 'au';
                                        break;
                                    case 'Tokyo':
                                        country = 'jp';
                                        break;
                                }
             
                                return '<span class="flag ' + country + '"></span> ' + data;
                            }
             
                            return data;
                        }
                    },
                    {
                        data: 'extn',
                        render: function (data, type, row, meta) {
                            return type === 'display'
                                ? '<progress value="' + data + '" max="9999"></progress>'
                                : data;
                        }
                    },
                    {
                        data: 'start_date'
                    },
                    {
                        data: 'salary',
                        render: function (data, type) {
                            var number = DataTable.render
                                .number(',', '.', 2, '$')
                                .display(data);
             
                            if (type === 'display') {
                                let color = 'green';
                                if (data < 250000) {
                                    color = 'red';
                                }
                                else if (data < 500000) {
                                    color = 'orange';
                                }
             
                                return `<span style="color:${color}">${number}</span>`;
                            }
             
                            return number;
                        }
                    }
                ]
            });            
        </script>
    </body>
</html>
